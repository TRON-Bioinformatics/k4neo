local-cores: 16
latency-wait: 120
rerun-triggers: mtime
retries: 3
default-resources:
  mem_mb: 4096
  threads: 1
  runtime: 3600

set-threads:
  raptor_prepare_per_sample: 1
  gather_raptor_minimisers: 1
  raptor_sample_mapping: 1
  raptor_layout: 1
  raptor_build: 16
  query_raptor: 1
  kmindex_query: 16
  parse_raptor_subindex_search: 1
  parse_kmindex_subindex_search: 1
  gather_raptor_subindex_results: 1
  gather_kmindex_subindex_results: 1

set-resources:
  raptor_prepare_per_sample:
    mem_mb: 16000 + ((attempt - 1) * 10000)
    runtime: "4h"
  gather_raptor_minimisers:
    mem_mb: 500 + ((attempt - 1) * 250)
    runtime: "1h"
  raptor_sample_mapping:
    mem_mb: 500 + ((attempt - 1) * 250)
    runtime: "1h"
  raptor_layout:
    mem_mb: 500 + ((attempt - 1) * 250)
    runtime: "1h"
  kmindex_query:
    mem_mb: 20000 + ((attempt - 1) * 10000)
    runtime: "2h"
  parse_raptor_subindex_search:
    mem_mb: 2000 + ((attempt - 1) * 2000)
    runtime: "1h"
  parse_kmindex_subindex_search:
    mem_mb: 2000 + ((attempt - 1) * 2000)
    runtime: "1h"
  gather_raptor_subindex_results:
    mem_mb: 20000 + ((attempt - 1) * 20000)
    runtime: "1h"
  gather_kmindex_subindex_results:
    mem_mb: 20000 + ((attempt - 1) * 20000)
    runtime: "1h"
