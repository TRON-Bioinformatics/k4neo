- name: test_k4neo_seq_not_in_index
  tags:
    - integrationtest
  command: >
    poetry run k4neo-annotator
       --database tests/resources/index_metadata.sqlite3
       --index tests/resources/index_manifest.yaml
       --input_yaml tests/resources/yaml_input_seq_not_found/annotation_input.yaml 
       --working-dir .
       --output test_nx
       --ratio 0.7
       --compress
  files:
    - path: 'test_nx_annotated_raptor.tsv.gz'
      contains:
        - "MELK_junc_2	0	0				"
    - path: 'test_nx_healthy_sample_rate_raptor.tsv.gz'
      contains:
        - "MELK_junc_2	adult	bladder	0.0"
        - "MELK_junc_2	adult	brain	0.0"
        - "MELK_junc_2	adult	breast	0.0"
        - "MELK_junc_2	adult	heart	0.0"
        - "MELK_junc_2	adult	lung	0.0"
        - "MELK_junc_2	adult	placenta	0.0"
        - "MELK_junc_2	adult	spleen	0.0"
        - "MELK_junc_2	adult	stomach	0.0"
        - "MELK_junc_2	adult	testis	0.0"
    - path: 'test_nx_tumor_sample_rate_raptor.tsv.gz'
      contains:
        - "MELK_junc_2	primary solid tumor	Triple Negative Breast Cancer	0.0"
  stdout:
    contains:
      - "query=True"
      - "indexing=False"
      - "kmer_ratio=0.7"
      - "Finished query pipeline"
      - "Annotating query results of method: raptor"
  stderr:
    contains:
      - "None of the queried sequences was found in index"