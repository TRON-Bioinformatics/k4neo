- name: test_k4neo_plotting
  tags:
    - integrationtest
  command: >
    bash -c "
    poetry run k4neo-annotator --database tests/resources/index_metadata.db --index tests/resources/index_manifest.yaml --queries tests/resources/queries/test_junction_k4neo_input.tsv --compress --working-dir . --output ./test_jx ;
    poetry run k4neo-plotter --input ./test_jx --output test_picture.png
    "
  files:
    - path: 'test_picture.png'

- name: test_k4neo_uniqueness
  tags:
    - integrationtest
  command: >
    poetry run k4neo-uniq --fasta tests/resources/queries/query_splice.fa --reference_indices tests/resources/index/ref_meta.json --output test_uniq.tsv
  files:
    - path: 'test_uniq.tsv'
      contains:
        - "cts_id	genome_specific_rate	transcript_specific_rate	cts_unique_rate	cts_ref_rate"
        - "52dcb9d5e335e70d	1.0000	0.0000	0.0000	1.0000"
        - "c655f2dce34f5636	0.9000	0.9000	0.0000	1.0000"
  stdout:
    contains:
      - "Annotated uniqueness of 14 sequences"

- name: test_k4neo_ref_index
  tags:
    - integrationtest
  command: >
    poetry run k4neo-ref-index 
      --genome tests/resources/index/ref_mini/minigenome.fa
      --transcriptome tests/resources/index/ref_mini/minitranscriptome.fasta 
      --kmer 21 --output .
  files:
    - path: 'transcriptome.jf'
    - path: 'metadata.json'
      contains:
        - '"kmer_size": "21"'
        - '"genome_fasta": "minigenome.fa"'
        - '"transcriptome_fasta": "minitranscriptome.fasta"'
  stdout:
    contains:
      - "jellyfish count -m 21 -s 3G -C -o ./genome.jf tests/resources/index/ref_mini/minigenome.fa"
      - "jellyfish count -m 21 -s 100M -o ./transcriptome.jf tests/resources/index/ref_mini/minitranscriptome.fasta"