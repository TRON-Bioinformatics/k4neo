- name: test_k4neo_with_jx
  tags:
    - integrationtest
  command: >
    poetry run k4neo-annotator
      --database tests/resources/index_metadata.db
      --index tests/resources/index_manifest.yaml
      --queries tests/resources/queries/test_junction_k4neo_input.tsv
      --working-dir .
      --output test_jx
      --ratio 0.7
  files:
    - path: 'test_jx_annotated_raptor.tsv.gz'
      contains:
        - 'dde52f9b214f3e15	3	3	healthy	adult	lung	Innotop_Normal'
        - 'dde52f9b214f3e15	2	3	healthy	adult	stomach	Innotop_Normal'
        - 'dde52f9b214f3e15	2	3	healthy	adult	testis	Innotop_Normal'
        - '5e0adbb9fe1aee63	0	0'
        - '36a7233af1d21164	3	3	healthy	adult	testis	Innotop_Normal'
        - '36a7233af1d21164	16	20	primary solid tumor	adult	Triple Negative Breast Cancer	Innotop_TNBC'
        - '06ec3cff497888f2	3	3	healthy	adult	bladder	Innotop_Normal'
        - '06ec3cff497888f2	18	20	primary solid tumor	adult	Triple Negative Breast Cancer	Innotop_TNBC'
    - path: 'test_jx_healthy_sample_rate_raptor.tsv.gz'
      contains:
        - 'dde52f9b214f3e15	adult	bladder	3	0	0.0'
        - 'dde52f9b214f3e15	adult	brain	3	0	0.0'
        - 'dde52f9b214f3e15	adult	breast	3	0	0.0'
        - 'dde52f9b214f3e15	adult	heart	3	0	0.0'
        - 'dde52f9b214f3e15	adult	lung	3	3	1.0'
        - 'dde52f9b214f3e15	adult	placenta	3	0	0.0'
        - 'dde52f9b214f3e15	adult	spleen	3	0	0.0'
        - 'dde52f9b214f3e15	adult	stomach	3	2	0.6666666666666666'
        - 'dde52f9b214f3e15	adult	testis	3	2	0.6666666666666666'
        - '06ec3cff497888f2	adult	bladder	3	3	1.0'
        - '06ec3cff497888f2	adult	brain	3	3	1.0'
        - '06ec3cff497888f2	adult	breast	3	3	1.0'
        - '06ec3cff497888f2	adult	heart	3	2	0.6666666666666666'
        - '06ec3cff497888f2	adult	lung	3	3	1.0'
        - '06ec3cff497888f2	adult	placenta	3	3	1.0'
        - '06ec3cff497888f2	adult	spleen	3	3	1.0'
        - '06ec3cff497888f2	adult	stomach	3	3	1.0'
        - '06ec3cff497888f2	adult	testis	3	3	1.0'
        - '3a1603799541d56c	adult	bladder	3	2	0.6666666666666666'
        - '3a1603799541d56c	adult	brain	3	0	0.0'
        - '3a1603799541d56c	adult	breast	3	3	1.0'
        - '3a1603799541d56c	adult	heart	3	0	0.0'
        - '3a1603799541d56c	adult	lung	3	3	1.0'
        - '3a1603799541d56c	adult	placenta	3	3	1.0'
        - '3a1603799541d56c	adult	spleen	3	0	0.0'
        - '3a1603799541d56c	adult	stomach	3	1	0.3333333333333333'
        - '3a1603799541d56c	adult	testis	3	0	0.0'
    - path: 'test_jx_tumor_sample_rate_raptor.tsv.gz'
      contains:
        - 'dde52f9b214f3e15	primary solid tumor	Triple Negative Breast Cancer	20	0	0.0'
        - '06ec3cff497888f2	primary solid tumor	Triple Negative Breast Cancer	20	18	0.9'
        - '3a1603799541d56c	primary solid tumor	Triple Negative Breast Cancer	20	15	0.75'
  stdout:
    contains:
      - "query=True"
      - "indexing=False"
      - "kmer_ratio=0.7"
      - "methods=['raptor']"
      - "Finished query pipeline"
      - "Parsing parquet file of k-mer query pipeline"
      - "Parsing query results of method: raptor"

