- name: test_k4neo_seq_to_short
  tags:
    - integrationtest
  command: >
    poetry run k4neo-annotator
       --database tests/resources/index_metadata.db
       --index tests/resources/index_manifest.yaml
       --queries tests/resources/queries/test_seq_to_short.tsv
       --working-dir .
       --output test_sx
       --ratio 0.7
  files:
    - path: 'test_sx_annotated_raptor.tsv.gz'
      contains:
        - "3:138010445-138023658:+"
        - "dde52f9b214f3e15"
        - "a534b03cc1757cac71b2265687a2b019"
      must_not_contain:
        - "12:4645192-4648745:-"
        - "GACTCTCAGTTTCCTGTTCCCTGA"
        - "07eb80a14ccf64e225d2db0a55ce9fe5"
    - path: 'test_sx_non_querable.tsv.gz'
      contains:
        - "12:4645192-4648745:-"
        - "GACTCTCAGTTTCCTGTTCCCTGA"
        - "07eb80a14ccf64e225d2db0a55ce9fe5"
  stdout:
    contains:
      - "query=True"
      - "indexing=False"
      - "kmer_ratio=0.7"
      - "methods=['raptor']"
      - "Finished query pipeline"
      - "Parsing parquet file of k-mer query pipeline"
      - "Parsing query results of method: raptor"

- name: test_k4neo_plotting
  tags:
    - integrationtest
  command: >
    bash -c "
    poetry run k4neo-annotator --database tests/resources/index_metadata.db --index tests/resources/index_manifest.yaml --queries tests/resources/queries/test_junction_k4neo_input.tsv --working-dir . --output ./test_jx ;
    poetry run k4neo-plotter --input ./test_jx --output test_picture.png
    "
  files:
    - path: 'test_picture.png'
