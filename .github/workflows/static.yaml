name: Build and Deploy MkDocs to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH for private submodules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUBMODULE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Resolve relative URL and pull submodules
        run: |
          sed -i 's|url = \.\./|url = git@github.com:TRON-Private/|' .gitmodules
          git submodule sync
          git submodule update --init --recursive    
      
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "latest"
      
      - name: Install k4neo
        run: |
          poetry install --with docs

      - name: Trust Git directory
        run: git config --global --add safe.directory "$(pwd)"

      - name: Build MkDocs site
        shell: bash -l {0}
        run: |
          poetry run mkdocs build -f documentation/mkdocs.yaml -d site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/site

      - name: Deploy to GitHub Pages
        id: deployment

        uses: actions/deploy-pages@v4

