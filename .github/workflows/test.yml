name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH for private submodules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUBMODULE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: k4neo
          environment-file: k4neo.yaml
          miniforge-variant: Mambaforge
          miniforge-version: latest

      - name: Show Python version
        run: python -V

      - name: Install Poetry
        run: |
          pip install poetry
          poetry install

      - name: Run Pytest (fast tests)
        run: |
          pytest -v --git-aware k4neo/tests/

  test_full:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')
    steps:
      - name: Setup SSH for private submodules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUBMODULE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: k4neo
          environment-file: k4neo.yaml
          miniforge-variant: Mambaforge
          miniforge-version: latest

      - name: Install Poetry
        run: |
          pip install poetry
          poetry install

      - name: Run Full Pytest
        run: |
          pytest --git-aware --symlink --stderr-bytes 100000 tests/
